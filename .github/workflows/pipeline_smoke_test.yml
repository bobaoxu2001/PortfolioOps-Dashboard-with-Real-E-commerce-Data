name: Pipeline Smoke Test

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download Olist public data
        run: python python/download_olist_data.py

      - name: Build reporting layer
        run: python python/build_reporting_layer.py

      - name: Run data contract checks
        run: python python/run_data_contract_tests.py
